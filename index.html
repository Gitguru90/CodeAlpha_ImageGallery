<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Image Gallery</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="full-image" id="fullImageBox">

    <span class="close" onclick="closeFullImage()">X</span>

    <span class="prev" onclick="changeImage(-1)">❮</span>

    <img src="images/image1.jpg.jpg" id="fullImage">

    <span class="next" onclick="changeImage(1)">❯</span>

</div>

<div class="buttons">

    <button onclick="filterImages('all')">All</button>

    <button onclick="filterImages('nature')">Nature</button>

    <button onclick="filterImages('cars')">Cars</button>

</div>

<button class="dark-btn" onclick="toggleMode()">
    🌙 Dark Mode
</button>



    <div class="image-gallery">
<div class="image-gallery">

    <img src="images/image1.jpg.jpg" class="nature" onclick="openFullImage(this.src)">

    <img src="images/image2.jpg.jpg" onclick="openFullImage(this.src)">

    <img src="images/image3.jpg.jpg"  onclick="openFullImage(this.src)">

    <img src="images/image4.jpg.jpg"  onclick="openFullImage(this.src)">

    <img src="images/image5.jpg.jpg"  onclick="openFullImage(this.src)">

    <img src="images/image6.jpg.jpg"  onclick="openFullImage(this.src)">

   

    <img src="images/image8.jpg.jpg" onclick="openFullImage(this.src)">

    <img src="images/image9.jpg.jpg" onclick="openFullImage(this.src)">

    <img src="images/image10.jpg.jpg" onclick="openFullImage(this.src)">

    <img src="images/image11.jpg" class="cars" onclick="openFullImage(this.src)">

    <img src="images/image12.jpg" class="cars" onclick="openFullImage(this.src)">

    <img src="images/image13.jpg" class="nature" onclick="openFullImage(this.src)">

    <img src="images/image14.jpg" class="nature" onclick="openFullImage(this.src)">

    <img src="images/image15.jpg" class="nature" onclick="openFullImage(this.src)">

    <img src="images/image16.jpg" class="cars" onclick="openFullImage(this.src)">

</div>

</div>

    </div>



    <!-- JavaScript -->

   <script>

    let fullImageBox = document.getElementById("fullImageBox");

    let fullImage = document.getElementById("fullImage");

    let images = document.querySelectorAll(".image-gallery img");

    let currentIndex = 0;



    function openFullImage(pic){

        fullImageBox.style.display = "flex";

        fullImage.src = pic;


        for(let i = 0; i < images.length; i++){

            if(images[i].src === pic){

                currentIndex = i;

            }

        }
    }



    function closeFullImage(){

        fullImageBox.style.display = "none";

    }



    function changeImage(direction){

        currentIndex += direction;


        if(currentIndex >= images.length){

            currentIndex = 0;

        }


        if(currentIndex < 0){

            currentIndex = images.length - 1;

        }


        fullImage.src = images[currentIndex].src;
    }

    function filterImages(category){

    let images = document.querySelectorAll(".image-gallery img");


    images.forEach((img)=>{

        if(category === "all"){

            img.style.display = "block";
        }

        else if(img.classList.contains(category)){

            img.style.display = "block";
        }

        else{

            img.style.display = "none";
        }

    });
}
function toggleMode(){

    document.body.classList.toggle("dark");
}

  
</script>
